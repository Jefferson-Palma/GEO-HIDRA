<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuladorFinanceiro</title>
    <link rel="stylesheet" href="styles/styleSimulador.css">
</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html#sobreNos">Sobre Nós</a></span>
                <span>Contato</span>
                <span>
                    <a href="login.html">
                        <img src="assets/imgs/Design sem nome.png" alt="" width="50px">
                    </a>
                </span>
            </div>
        </div>
    </header>
    <div style="text-align: center;" class="container">
        <div class="simulador-container">
            <div class="card">
                <div id="div_msg">
                    <h1>Simulador Financeiro</h1> <br>
                    <input class="input_financeiro" type="text" id="input_valorObra" placeholder="Informe o custo total da obra:"> <br> <br>
                    <input class="input_financeiro" type="text" id="input_tempo" placeholder="Informe o tempo para a obra ser concluída (em meses):">
                    <br><br>
                    <button class="button_financeiro" onclick="calcular()">Simular</button> <br> <br>
                </div>
                <div id="div_msg2" class="div_msg2" style="text-align: center;"></div>
            </div>
        </div>
    </div>

        <footer>
            <div class="footerConteudo">
                <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
                </div>
                <div class="conteudo">
                    <span><a href="inicial.html">Home</a></span>
                    <span><a href="inicial.html#sobreNos">Sobre Nós</a></span>
                    <span><a href="inicial.html#contato">Contato</a></span>
                </div>
            </div>
        </footer>
</body>

</html>
<script>
    function calcular() {
        let valorObra = Number(input_valorObra.value);
        let tempo = Number(input_tempo.value);
        let valorInicio = valorObra * 1.3
        let atraso = tempo + 6;
        div_msg.style.display = 'none';
        div_msg2.innerHTML = `
            <h1>Simulador Financeiro</h1> <br> 
            <div class="container_mensagem">
                Custo esperado para a obra: <span>R$${valorObra.toFixed(2)}</span><br> <br>
                Possível custo da obra total sem verificação de umidade do solo da Geo Hidra na etapa da fundação(aumento de 30%): <span style="color:red">R$${valorInicio.toFixed(2)}</span><br> <br>
                Possível tempo de entrega estimado da obra após atrasos(aumento de 6 meses): <span style="color:red">${atraso} meses</span><br> <br>
                Com a Geo Hidra você pode garantir que o solo da sua obra está pronto para construir sem aumento indesejado nos custos. <br> 
            </div>
            <button class="button_financeiro"><a href="Simulador-Financeiro.html">Simule Novamente</a></button>
        `;
    }
</script>
