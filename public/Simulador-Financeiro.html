<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuladorFinanceiro</title>
    <link rel="stylesheet" href="styles/styleSimulador.css">
</head>
<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html #sobreNos">Sobre Nós</a></span>
                <span>Contato</span>
                <span>
                    <a href="login.html">
                        <img src="assets/imgs/Design sem nome.png" alt="" width="50px">
                    </a>
                </span>
            </div>
        </div>
    </header>
    <div style="text-align: center;"> <!-- "text-align" é uma propriedade de estilo que define o alinhamento do conteúdo; "center" faz os elementos dentro da div ficarem centralizados horizontalmente-->
        <h1>Simulador Financeiro</h1> <br>
        Informe o custo total da obra: <br> <input type="text" id="input_valorObra"> <br> <br>
        Informe o tempo para ser concluída a obra (em meses):<br> <input type="text" id="input_tempo"> <br><br>
        
        <div id="div_msg" style="text-align: center;"></div>

        <button onclick="calcular()">Calcular</button> <br> <br>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html #sobreNos">Sobre Nós</a></span>
                <span>Contato</span>
            </div>
        </div>
    </footer>
</body>
</html>
<script>
    function calcular(){
        let valorObra=Number(input_valorObra.value);
        let tempo=Number(input_tempo.value);
        let valorInicio=valorObra*1.3
        let atraso=tempo+6;
        div_msg.innerHTML=`Custo esperado para a obra: <span>R$${valorObra.toFixed(2)}</span><br>
        Possível custo da obra total sem verificação de umidade do solo da Geo Hidra na etapa da fundação(aumento de 30%): <span style="color:red">R$${valorInicio.toFixed(2)}</span><br>
        Possível tempo de entrega estimado da obra após atrasos(aumento de 6 meses):<span style="color:red">${atraso} meses</span><br>
        Com a Geo Hidra você pode garantir que o solo da sua obra está pronto para construir sem aumento indesejado nos custos.`;
}
</script>
