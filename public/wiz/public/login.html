<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/styleCadastro.css">
    <link rel="icon" href="assets/imgs/logo.PNG" width="0.01px">
</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <span><a href="index.html">Home</a></span>
                <span><a href="index.html#sobreNos">Sobre Nós</a></span>
                <span><a href="index.html#contato">Contato</a></span>
            </div>
        </div>
    </header>

    <div class="container-login">
        <div class="caixa-login">
            <h1>Login</h1>
            <div class="campo">
                <p>Email</p>
                <input class="inputLogin" type="text" id="input_emailLogin" placeholder="Digite seu Email">
                <p>Senha</p>
                <input class="inputLogin" type="password" id="input_senhaLogin" placeholder="Digite sua Senha">
            </div>
            <div class="mensagemDeErroLogin" id="mensagem"></div>
            <div id="login_mensagem" style="display: none"></div>
            <div class="botao">
                <button onclick="login()">Login</button>
            </div>
        </div>
        <div class="imagemLogin">
            <img src="assets/imgs/pexels-keat007-32858871 1.png" alt="Imagem Login" width="530px">
        </div>
    </div>

    </div>
    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="index.html">Home</a></span>
                <span><a href="index.html#sobreNos">Sobre Nós</a></span>
                <span><a href="index.html#contato">Contato</a></span>
            </div>
        </div>
    </footer>

</body>

</html>
<script>

    let contador = 3

    function login() {
        let email = input_emailLogin.value;
        let senha = input_senhaLogin.value;

        if (contador == 0) {
            alert("Acesso Bloqueado para resolver esse problema abra um chamado.")
            return false;
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha,

            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nomeFuncionario;
                    sessionStorage.ID_USUARIO = json.idFuncionario;
                    sessionStorage.FK_EMPRESA = json.fkEmpresa;
                    sessionStorage.TIPO_ACESSO = json.tipoDeAcesso;

                    if (sessionStorage.TIPO_ACESSO == "suporte") {
                       alert("Login realizado com sucesso!");
                         setTimeout(() => {
                        window.location = "bobia.html";
                    }, 2000);
                    } else {
                        alert("Login realizado com sucesso!");
                         setTimeout(() => {
                        window.location = "dashboard.html";
                    }, 2000);
                    }
                    
                    //  sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)
                    // apenas para exibir o loading
                });

            } else {
                mensagem.style.display = "block";
                mensagem.innerHTML = "Email ou senha inválidos"
                contador--;



                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
