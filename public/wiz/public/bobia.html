<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobIA</title>
    <link rel="stylesheet" href="styles/bobia.css">
    <link rel="icon" href="assets/imgs/logo.PNG" width="0.01px">
    <script src="/js/sessao.js"></script>
</head>

<body>
       <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">

                <div class="dashboard" >
                    <span>
                       <a id="tickets" href="https://sptech-team-hst2y1fq.atlassian.net/jira/servicedesk/projects/GH/queues/custom/49" style="color: white;">Tickets</a>
                    </span>
                </div>
                <button class="dashboard" onclick="limparSessao()" style="text-align: center">Sair</button>
                    
                </div>
            </div>
        </div>
    </header>


    <div id="container">
        <h1>BobIA</h1>
        <textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
        <br><br>
        <button onclick="gerarResposta()">Gerar Resposta</button>
        <h3>Resposta da IA:</h3>
        <div id="resposta"></div>
    </div>

</body>

</html>

<script>
   
    let tickets = document.getElementById("tickets");

    if (sessionStorage.TIPO_ACESSO != "suporte") {
        window.location = "dashboard.html"
    }
    if(sessionStorage.FK_EMPRESA != 1){

       tickets.href = "https://sptech-team-hst2y1fq.atlassian.net/servicedesk/customer/portal/36/create/64"
    }
        async function gerarResposta() {
            const pergunta = document.getElementById('pergunta').value;

            const response = await fetch('/perguntar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pergunta })
            });

            const data = await response.json();

            resposta.style.display = 'block';
            document.getElementById('resposta').innerText = data.resultado;
        }
    

</script>
