<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Geral</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <div id="cadastro1" class="funcionarioCadastro">
                    <span>
                        <a href="cadastroObra.html" style="color: white;">Cadastrar obra</a>
                    </span>
                </div>
                <div id="cadastro2" class="funcionarioCadastro"><span>
                        <a href="cadastroFuncionario.html" style="color: white;">Cadastrar Funcionário</a>
                    </span>
                </div>
                <div id="cadastro2" class="funcionarioCadastro"><span>
                        <a href="https://sptech-team-hst2y1fq.atlassian.net/servicedesk/customer/portal/36/create/64"
                            style="color: white;">Suporte</a>
                    </span>
                </div>
                <div class="sair"><span> <button onclick="limparSessao()"
                            style="text-align: center; color: #6a3e37;">Sair</button>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <div class="boxGeral">
        <div class="obra">
            <div class="usuario">
                <img src="assets/imgs/Design sem nome.png" alt="" width="30px">
                <p>Nome usuário</p>
            </div>
        </div>
        <div class="kpi">
            <div class="box-kpi">
                <h4>OBRAS MONITORADAS</h4>
                <div class="projecao">
                    <span class="textoKpi">8</span>
                </div>
            </div>
            <div class="box-kpi">
                <h4>OBRAS EM ALERTA</h4>
                <div class="projecao">
                    <span class="textoKpiProblema">2</span>
                </div>
            </div>
            <div class="box-kpi">
                <h4>OBRAS COM UMIDADE CRÍTICA</h4>
                <div class="projecao">
                    <span class="textoKpiProblema">5</span>
                </div>
            </div>
        </div>

        <div class="divGeral">
            <div class="graficoGeral">
                <div class="grafico-geral">
                    <h3 class="tituloGraficosGeral">Estado das Obras</h3>
                    <canvas class="graficoDashGeral" id="graficoComposicao"></canvas>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
<script>
    Chart.defaults.color = "#000"
    new Chart(document.getElementById('graficoComposicao'), {
        type: 'doughnut',
        data: {
            labels: ['Normal', 'Alerta', 'Crítico'],
            datasets: [{
                data: [1, 2, 5],
                backgroundColor: [
                    'rgb(106, 62, 55)',
                    'rgb(6, 186, 99)',
                    'rgb(29, 205, 254)'
                ],
                borderWidth: 0
            }]
        },
        options: {}
    });
</script>
