<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Geral</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="filterTableAll()">
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <div id="cadastro1" class="funcionarioCadastro">
                    <span>
                        <a href="cadastroObra.html" style="color: white;">Cadastrar obra</a>
                    </span>
                </div>
                <div id="cadastro2" class="funcionarioCadastro"><span>
                        <a href="cadastroFuncionario.html" style="color: white;">Cadastrar Funcionário</a>
                    </span>
                </div>
                <div id="cadastro2" class="funcionarioCadastro"><span>
                        <a href="https://sptech-team-hst2y1fq.atlassian.net/servicedesk/customer/portal/36/create/64"
                            style="color: white;">Suporte</a>
                    </span>
                </div>
                <div class="sair"><span> <button onclick="limparSessao()"
                            style="text-align: center; color: #6a3e37;">Sair</button>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <div class="boxGeral">
            <div class="kpisGeral">
                <div class="kpiGeral1">
                    <h4>OBRAS MONITORADAS</h4>
                    <div class="projecao">
                        <span class="textoKpi">8</span>
                    </div>
                </div>
                <div class="kpiGeral2">
                    <h4>OBRAS EM ALERTA</h4>
                    <div class="projecao">
                        <span class="textoKpiProblema">2</span>
                    </div>
                </div>
            </div>
        <div class="tabelaDash">
                <div class="graficoGeral">
                    <div class="grafico-geral">
                        <h3 class="tituloGraficosGeral">Estado das Obras</h3>
                        <canvas class="graficoDashGeral" id="graficoComposicao"></canvas>
                    </div>
                </div>

            <div class="obras-card">
                <div class="obras-header">
                    <div class="obras-title">Status de Umidade por Obra</div>
                    <div class="filter-badges">
                        <span id="span1" class="fb" onclick="filterTableAll()">Todas</span>
                        <span id="span2" class="fb" onclick="filterTableAlerta()">Alerta</span>
                        <span id="span3" class="fb" onclick="filterTableNormal()">Normal</span>
                    </div>
                </div>
                <div id="obrasTable">
                    <div class="headerTable">
                        <span>Obra</span>
                        <span>Status</span>
                    </div>
                    <div id="obrasBody"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="index.html">Home</a></span>
                <span><a href="index.html #sobreNos">Sobre Nós</a></span>
                <span><a href="index.html#contato">Contato</a></span>
            </div>
        </div>
    </footer>
</body>

</html>
<script>
    const obras = [
        { nome: "Ed. Vitor Meireles", addr: "R. Vitor Meireles, 88", st: "Alerta", ts: "18/05 00:42" },
        { nome: "Torre Marítima", addr: "Av. do Porto, 1200", st: "Alerta", ts: "18/05 00:41" },
        { nome: "Galpão Industrial 3", addr: "Rodovia Anhang., km 32", st: "OK", ts: "18/05 00:43" },
        { nome: "Shopping Norte", addr: "Av. Norte, 3000 — SP", st: "OK", ts: "18/05 00:44" },
        { nome: "Centro Log. SP", addr: "Dist. Industrial, Q3", st: "OK", ts: "18/05 00:45" },
        { nome: "Col. Nova Geração", addr: "R. Escolar, 75 — SP", st: "OK", ts: "18/05 00:44" },
    ];
    function filterTableAll() {
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#06BA63"
        span2.style.backgroundColor = "#fff"
        span3.style.backgroundColor = "#fff"
        span1.style.color = "#fff"
        span2.style.color = "#000"
        span3.style.color = "#000"

        obrasBody.innerHTML = "";
        for (let i = 0; i < obras.length; i++) {
            obrasBody.innerHTML += `
                <div class="dadosGerais">
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${obras[i].nome} <br> ${obras[i].addr}</span>
                    </div>
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${obras[i].st}</span>
                    </div>
                </div> 
                <hr>`;
        }
    }

    function filterTableAlerta(){
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#fff"
        span2.style.backgroundColor = "#06BA63"
        span3.style.backgroundColor = "#fff"
        span1.style.color = "#000"
        span2.style.color = "#fff"
        span3.style.color = "#000"

        obrasBody.innerHTML = "";
        for (let i = 0; i < obras.length; i++) {
            if(obras[i].st == "Alerta"){
                obrasBody.innerHTML += `
                    <div class="dadosGerais">
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${obras[i].nome} <br> ${obras[i].addr}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${obras[i].st}</span>
                        </div>
                    </div> 
                    <hr>`;
            }
        }
    }
    function filterTableNormal(){
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#fff"
        span2.style.backgroundColor = "#fff"
        span3.style.backgroundColor = "#06BA63"
        span1.style.color = "#000"
        span2.style.color = "#000"
        span3.style.color = "#fff"

        obrasBody.innerHTML = "";
        for (let i = 0; i < obras.length; i++) {
            if(obras[i].st == "OK"){
                obrasBody.innerHTML += `
                    <div class="dadosGerais">
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${obras[i].nome} <br> ${obras[i].addr}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${obras[i].st}</span>
                        </div>
                    </div> 
                    <hr>`;
            }
        }
    }

    Chart.defaults.color = "#000"
    new Chart(document.getElementById('graficoComposicao'), {
        type: 'doughnut',
        data: {
            labels: ['Normal', 'Alerta', 'Crítico'],
            datasets: [{
                data: [1, 2, 5],
                backgroundColor: [
                    'rgb(106, 62, 55)',
                    'rgb(6, 186, 99)',
                    'rgb(29, 205, 254)'
                ],
                borderWidth: 0
            }]
        },
        options: {}
    });

</script>
