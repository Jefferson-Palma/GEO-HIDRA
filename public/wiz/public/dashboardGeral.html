<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Geral</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/imgs/logo.PNG" width="0.01px">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/sessao.js"></script>
</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <div id="cadastro3" class="funcionarioCadastro">
                    <span>
                        <a href="cadastroObra.html" style="color: white;">Cadastrar obra</a>
                    </span>
                </div>
                <div id="cadastro1" class="funcionarioCadastro"><span>
                        <a href="cadastroFuncionario.html" style="color: white;">Cadastrar Funcionário</a>
                    </span>
                </div>
                <div id="cadastro2" class="funcionarioCadastro"><span>
                        <a href="https://sptech-team-hst2y1fq.atlassian.net/servicedesk/customer/portal/36/create/64"
                            style="color: #06ba63;">Suporte</a>
                    </span>
                </div>
                <div id="cadastro" class="funcionarioCadastro">
                    <span>
                        <a href="alterarSenha.html" style="color: #06ba63;">Alterar Senha</a>
                    </span>
                </div>
                <div class="sair"><span> <button onclick="limparSessao()"
                            style="text-align: center; color: #6a3e37;">Sair</button>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <div class="boxGeral">
        <div class="olaUsuario">
            <h2>Olá, <span id="b_usuario"></span>!</h2>
        </div>
        <div class="kpisGeral">
            <div class="kpiGeral1">
                <h4>OBRAS MONITORADAS</h4>
                <div class="projecao">
                    <span class="textoKpi" id="totalObras"></span>
                </div>
            </div>
            <div class="kpiGeral2">
                <h4>OBRAS EM ALERTA</h4>
                <div class="projecao">
                    <span class="textoKpiProblema" id="totalAlerta"></span>
                </div>
            </div>
        </div>
        <div class="tabelaDash">
            <div class="graficoGeral">
                <div class="grafico-geral">
                    <h3 class="tituloGraficosGeral">Estado das Obras</h3>
                    <canvas class="graficoDashGeral" id="graficoComposicao"></canvas>
                </div>
            </div>

            <div class="obras-card">
                <div class="obras-header">
                    <div class="obras-title">Status de Umidade por Obra</div>
                    <div class="filter-badges">
                        <span id="span1" class="fb" onclick="todasObras()">Todas</span>
                        <span id="span2" class="fb" onclick="apenasAlerta()">Alerta</span>
                        <span id="span3" class="fb" onclick="apenasNormal()">Normal</span>
                    </div>
                </div>
                <div id="obrasTable">
                    <div class="headerTable">
                        <span>Obra</span>
                        <span>Status</span>
                        <span>Umidade</span>
                        <span>Último Registro</span>
                    </div>
                    <div id="obrasBody"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="index.html">Home</a></span>
                <span><a href="index.html#sobreNos">Sobre Nós</a></span>
                <span><a href="index.html#contato">Contato</a></span>
            </div>
        </div>
    </footer>
</body>

</html>
<script>
    let fkEmpresa = sessionStorage.FK_EMPRESA;
    let myChart;

    let proximaAtualizacao;

    let listaObras = [];

    window.onload = validarSessao();

    window.onload = validarTipoUser();

    window.onload = exibirGrafico();

    if (sessionStorage.TIPO_ACESSO == "suporte") {
        window.location = "bobia.html"
    }


    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;

        if (nome != null) {
            b_usuario.innerHTML = nome;

        } else {
            window.location = "../login.html";
        }
    }

    function validarTipoUser() {
        var tipoUser = sessionStorage.TIPO_ACESSO;
        if (tipoUser == "comum" || tipoUser == "suporte") {
            cadastro1.style.display = "none";
            cadastro2.style.display = "none";
            cadastro3.style.display = "none";

        } else {
            cadastro1.style.display = "block";
            cadastro2.style.display = "block";
        }
    }

    function exibirGrafico() {
        
        
        dashboardGeral(fkEmpresa);
    }


    function dashboardGeral(fkEmpresa) {

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }


        fetch(`/obra/dashboardGeral/${fkEmpresa}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);

                    
                    listaObras = resposta;
                    todasObras();
                    atualizarKPIs();
                    plotarGrafico(resposta, fkEmpresa);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function atualizarKPIs() {
        let total = listaObras.length;
        let alerta = 0;
        for (let i = 0; i < listaObras.length; i++) {
            if (listaObras[i].status == "Alerta") {
                alerta++;
            }
        }
        totalObras.innerHTML = total;
        totalAlerta.innerHTML = alerta;
    }

    function plotarGrafico(resposta, fkEmpresa) {
        console.log('iniciando plotagem do gráfico...');

        let normal = 0;
        let alerta = 0;
        for (let i = 0; i < resposta.length; i++) {
            if (resposta[i].status == "Normal") {
                normal++;
            } else if (resposta[i].status == "Alerta") {
                alerta++;
            }
        }

        let dados = {
            labels: ['Normal', 'Alerta'],
            datasets: [{
                data: [normal, alerta],
                backgroundColor: ['#06BA63', 'red'],
                tension: 0.1
            }

            ]


        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'doughnut',
            data: dados,
        };

        // Adicionando gráfico criado em div na tela


        myChart = new Chart(
            document.getElementById(`graficoComposicao`),
            config
        );

        setTimeout(() => atualizarGrafico(fkEmpresa, dados, myChart), 5000);

    }
    function todasObras() {
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#06BA63"
        span2.style.backgroundColor = "#fff"
        span3.style.backgroundColor = "#fff"
        span1.style.color = "#fff"
        span2.style.color = "#000"
        span3.style.color = "#000"

        

        
        obrasBody.innerHTML = "";
        for (let i = 0; i < listaObras.length; i++) {
            
                if(listaObras[i].status == 'Normal'){
                    
                     obrasBody.innerHTML += `
                <div class="dadosGerais" style="cursor:pointer" onclick="irParaObra(${listaObras[i].idObra})">
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${listaObras[i].endereco}</span>
                    </div>
                    <div class="divDadosTabela">
                        <span class="dadosTabelas" style="color:green"><b>${listaObras[i].status}</b></span>
                    </div>
                     <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].umidade}</span>
                        </div>
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${listaObras[i].ultimoRegistro}</span>
                    </div>
                </div> 
                <hr>`
                }else{
                          obrasBody.innerHTML += `
                <div class="dadosGerais" style="cursor:pointer" onclick="irParaObra(${listaObras[i].idObra})">
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${listaObras[i].endereco}</span>
                    </div>
                    <div class="divDadosTabela">
                        <span class="dadosTabelas" style="color:red"><b>${listaObras[i].status}</b></span>
                    </div>
                     <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].umidade}</span>
                        </div>
                    <div class="divDadosTabela">
                        <span class="dadosTabelas">${listaObras[i].ultimoRegistro}</span>
                    </div>
                </div> 
                <hr>`
                }
                ;
        }
    }

    function apenasAlerta() {
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#fff"
        span2.style.backgroundColor = "#06BA63"
        span3.style.backgroundColor = "#fff"
        span1.style.color = "#000"
        span2.style.color = "#fff"
        span3.style.color = "#000"

        obrasBody.innerHTML = "";
        for (let i = 0; i < listaObras.length; i++) {
            if (listaObras[i].status == "Alerta") {
                obrasBody.innerHTML += `
                    <div class="dadosGerais" style="cursor:pointer" onclick="irParaObra(${listaObras[i].idObra})">
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].endereco}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas" style="color:red"><b>${listaObras[i].status}</b></span>
                        </div>
                         <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].umidade}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].ultimoRegistro}</span>
                        </div>
                    </div> 
                    <hr>`;
            }
        }
    }
    function apenasNormal() {
        document.getElementById("span1");
        document.getElementById("span2");
        document.getElementById("span3");
        span1.style.backgroundColor = "#fff"
        span2.style.backgroundColor = "#fff"
        span3.style.backgroundColor = "#06BA63"
        span1.style.color = "#000"
        span2.style.color = "#000"
        span3.style.color = "#fff"

        obrasBody.innerHTML = "";
        for (let i = 0; i < listaObras.length; i++) {
            if (listaObras[i].status == "Normal") {
                obrasBody.innerHTML += `
                    <div class="dadosGerais" style="cursor:pointer" onclick="irParaObra(${listaObras[i].idObra})">
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].endereco}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas" style="color:green"><b>${listaObras[i].status}</b></span>
                        </div>
                         <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].umidade}</span>
                        </div>
                        <div class="divDadosTabela">
                            <span class="dadosTabelas">${listaObras[i].ultimoRegistro}</span>
                        </div>
                    </div> 
                    <hr>`;
            }
        }

    }
    function irParaObra(idObra) {
        sessionStorage.ID_OBRA = idObra;
        window.location = "dashboard.html";
    }

    function atualizarGrafico(fkEmpresa) {
    fetch(`/obra/dashboardGeralTempoReal/${fkEmpresa}`, { cache: 'no-store' })
        .then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {
                    console.log(`Dados atualizados: ${JSON.stringify(novoRegistro)}`);

                    listaObras = novoRegistro;

                    let normal = 0; 
                    let alerta = 0;

                    for (let i = 0; i < novoRegistro.length; i++) {
                        if (novoRegistro[i].status == "Normal") {
                            normal++;
                        }
                        else if (novoRegistro[i].status == "Alerta") {
                            alerta++;
                        }
                    }

                    myChart.data.datasets[0].data = [normal, alerta];
                    myChart.update();

                    atualizarKPIs();

                    if (span2.style.backgroundColor == "rgb(6, 186, 99)") {
                        apenasAlerta();
                    }
                    else if (span3.style.backgroundColor == "rgb(6, 186, 99)"){
                        apenasNormal();
                    }
                    else {
                        todasObras();
                    }

                    proximaAtualizacao = setTimeout(() => atualizarGrafico(fkEmpresa), 10000);
                });
            } else {
                console.error('Erro na API ao atualizar gráfico');
                proximaAtualizacao = setTimeout(() => atualizarGrafico(fkEmpresa), 10000);
            }
        })
        .catch(function (error) {
            console.error(`Erro na atualização: ${error.message}`);
            proximaAtualizacao = setTimeout(() => atualizarGrafico(fkEmpresa), 10000);
        });
}
</script>
