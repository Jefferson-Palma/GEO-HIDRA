<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="styles/styleCadastro.css">

</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">

            <div class="dashboard">
                <span>
                    <a href="dashboard.html" style="color: white;">Dashboard</a>
                </span>
            </div>
            <div class="dashboard">
                <span>
                    <a href="cadastroObra.html" style="color: white;">Cadastrar obra</a>
                </span>
            </div>
            <div class="sair"><span><a href="inicial.html" style="text-align: center; color: #6a3e37;">Sair</a>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <div class="container-cadastroFuncionario">
        <div class="caixa-cadastroFuncionario">
            <h1>Cadastrar Funcionário</h1>
            <div class="campo-cadastroFuncionario">
                <p>Nome</p>
                <input class="input_base" type="text" id="input_nomeFuncionario" placeholder="* Insira seu nome">
                <div class="mensagemDeErro" id="nomee"></div>

                <p class="p_cpf">CPF</p>
                <input class="input_base" type="text" id="input_cpf"
                    placeholder="* Insira seu CPF - Sem pontos e traços ">
                <div class="mensagemDeErro" id="cpff"></div>

                <p class="p_tipo_acesso">Tipo de acesso</p>
                <select class="input_base" name="" id="tipoAcesso">
                    <option value="none" selected disabled>* Selecione Um tipo De Acesso</option>
                    <option value="adm">Admiministrador</option>
                    <option value="comum">Comum</option>
                </select>
                <div class="mensagemDeErro" id="acessoo"></div>

                <p>Email</p>
                <input class="input_base" type="text" id="input_email"
                    placeholder="* Insira seu email - exemple@gmail.com">
                <div class="mensagemDeErro" id="emaill"></div>

                <p>Senha</p>
                <input class="input_base" type="password" id="input_senha" placeholder="* Insira sua senha">

                <p class="p_confirmar_senha">Confirmar senha</p>
                <input class="input_base" type="password" id="input_confirmarSenha" placeholder="* Confirme sua senha">
                <div class="mensagemDeErro" id="senhaa"></div>
            </div>
            <div class="botaoCadastroFuncionario">
                <button onclick="cadastro()">Registrar</button>
            </div>
        </div>
        <div class="imagemCadastroFuncionario">
            <img src="assets/imgs/pexels-keat007-32858871 1.png" alt="Imagem Cadastro Funcionario" width="850px">
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html#sobreNos">Sobre Nós</a></span>
                <span><a href="inicial.html#contato">Contato</a></span>
            </div>
        </div>
    </footer>
</body>

</html>

<script>
    function cadastro() {
        let numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]
        let nome = input_nomeFuncionario.value;
        let cpf = input_cpf.value;
        let acesso = document.getElementById('tipoAcesso');
        let valorSelecionado = acesso.value;
        let email = input_email.value;
        let senha = input_senha.value;
        let senha2 = input_confirmarSenha.value;
        let invalido = 0;
        let cpfInvalido = 0;

        //validação nome
        if (nome !== '') {
            for (let i = 0; i < nome.length; i++) {
                if (nome[i].toLowerCase() == nome[i].toUpperCase()) {
                    invalido++;
                    nomee.innerHTML = `Nome inválido`
                } else {
                    nomee.innerHTML = '';
                }
            }
        } else {
            nomee.innerHTML = `Nome inválido`
        }
        //validação cpf
        if (cpf.length == 11) {
            for (let i = 0; i < cpf.length; i++) {//i=caracter
                let certo = 0;
                for (let j = 0; j < numeros.length; j++) {//j=numero
                    if (cpf[i] == numeros[j]) {
                        certo++
                    }
                }
                if (certo <= 0) {
                    cpfInvalido++
                }
            }
            if (cpfInvalido > 0) {
                cpff.innerHTML = `CPF inválido`;
            } else {
                cpff.innerHTML = '';
            }

        } else if (cpf.length !== 11) {
            cpff.innerHTML = `CPF inválido`;
        } else {
            cpff.innerHTML = '';
        }
        //validação tipo de acesso
        if (valorSelecionado !== 'adm' && valorSelecionado !== 'comum') {
            acessoo.innerHTML = `Tipo de acesso Inválido`;
            invalido++
        } else {
            acessoo.innerHTML = '';
        }
        //validação email
        if (!email.endsWith('.com') || !email.includes('@')) {
            emaill.innerHTML = `Email inválido`;
            invalido++
        } else {
            emaill.innerHTML = '';
        }
        //validação senha
        if (senha !== '' || senha2 !== '') {
            if (senha != senha2) {
                senhaa.innerHTML = `Senhas não conferem`;
                invalido++
            } else {
                senhaa.innerHTML = '';
            }
        } else {
            senhaa.innerHTML = `Senha Inválida`;
        }
        if (invalido > 0) {
            alert('Cadastro não Realizado, Tente Novamente');
        } else {
            alert('Cadastro Realizado com sucesso');
            setTimeout((cadastro) => {
                window.location.replace("login.html");
            }, 750);


        }
    }




</script>
