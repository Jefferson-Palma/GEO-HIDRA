<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles/styleCadastro.css">

</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html #sobreNos">Sobre Nós</a></span>
                <span>Contato</span>
                <span>
                    <a href="login.html">
                        <img src="assets/imgs/Design sem nome.png" alt="" width="50px">
                    </a>
                </span>
            </div>
        </div>
    </header>

    <div class="container-cadastroFuncionario">
        <div class="caixa-cadastroFuncionario">
            <h1>Cadastrar Funcionário</h1>
            <div class="campo-cadastroFuncionario">
                <p>Nome</p>
                <input class="input_base" type="text" id="input_nomeFuncionario">
                <div id="nomee"></div>
                <p>CPF</p>
                <input class="input_base" type="text" id="input_cpf">
                <div id="cpff"></div>
                <p>Tipo de acesso</p>
                <input class="input_base" type="text" id="input_acesso">
                <div id="acessoo"></div>
                <p>Email</p>
                <input class="input_base" type="text" id="input_email">
                <div id="emaill"></div>
                <p>Senha</p>
                <input class="input_base" type="text" id="input_senha">
                <p>Confirmar senha</p>
                <input class="input_base" type="text" id="input_confirmarSenha">
                <div id="senhaa"></div>
                <div class="botaoCadastroFuncionario">
                    <button onclick="cadastro()">Registrar</button>
                </div>
            </div>

        </div>
        <div class="imagem">
            <img src="assets/imgs/pexels-keat007-32858871 1.png" alt="">
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="assets/imgs/Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span><a href="inicial.html">Home</a></span>
                <span><a href="inicial.html #sobreNos">Sobre Nós</a></span>
                <span>Contato</span>
            </div>
        </div>
    </footer>
</body>

</html>

<script>
    function cadastro() {
        let tipoAcessosValidos = ['Admin', 'admin', 'comum', 'Comum'];
        let numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]
        let nome = input_nomeFuncionario.value;
        let cpf = input_cpf.value;
        let email = input_email.value;
        let senha = input_senha.value;
        let senha2 = input_confirmarSenha.value;
        let tipoAcesso = input_acesso.value;
        let invalido = 0;
        let cpfInvalido = 0;

        //validação nome
        if (nome !== '') {
            for (letra in nome) {
                if (nome[letra].toLowerCase() == nome[letra].toUpperCase() && !nome[letra].includes(' ')) {
                    invalido++;
                    nomee.innerHTML = `<span style="color:red;">Nome invalido</span>`
                } else {
                    nomee.innerHTML = '';
                }

            }
        } else {
            nomee.innerHTML = `<span style="color:red;">Nome invalido</span>`
        }
        //validação cpf
        if (cpf.length == 11) {
            for (caracter in cpf) {
                let certo = 0;
                for (numero in numeros) {
                    if (cpf[caracter] == numeros[numero]) {
                        certo++
                    }
                }
                if (certo <= 0) {
                    cpfInvalido++
                }
            }
            if (cpfInvalido > 0) {
                cpff.innerHTML = `<span style="color:red;">CPF inválido</span>`;
            } else {
                cpff.innerHTML = '';
            }

        } else if (cpf.length !== 11) {
            cpff.innerHTML = `<span style="color:red;">CPF inválido</span>`;
        } else {
            cpff.innerHTML = '';
        }
        //validação email
        if (!email.endsWith('.com') || !email.includes('@')) {
            emaill.innerHTML = `<span style="color:red;">Email inválido</span>`
            invalido++
        } else {
            emaill.innerHTML = '';
        }
        //validação senha
        if (senha !== '' || senha2 !== '') {
            if (senha != senha2) {
                senhaa.innerHTML = `<span style="color:red;">Senhas não conferem</span>`
                invalido++
            } else {
                senhaa.innerHTML = ''
            }
        } else {
            senhaa.innerHTML = `<span style="color:red;">Senha Inválida</span>`
        }
        // validação tipo acesso
        if (tipoAcessosValidos.includes(tipoAcesso)) {
            acessoo.innerHTML = ''
        } else {
            acessoo.innerHTML = `<span style="color:red;">Tipo de Acesso Inválido</span>`
            invalido++
        }
        if (invalido > 0) {
            alert('Cadastro não Realizado, Tente Novamente')
        } else {
            alert('Cadastro Realizado com sucesso')
        //     setTimeout((cadastro) => {
        //         window.location.replace("login.html");
        //     }, 3000);

        //     exit();
         }
    }




</script>
