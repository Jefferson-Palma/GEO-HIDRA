<script>

    let login1 = 'brandao@sptech.com';
    let senha = 'brandao123@';
    let contador = 3

    function login() {


        let loginEmpresa = input_emailLogin.value;
        let senhaEmpresa = input_senhaLogin.value;

        if (login1 == loginEmpresa && senha == senhaEmpresa) {

        }
        if (contador == 0) {
            alert("Acesso bloqueado, fale com nossa equipe para resolver esse problema.")
        }
        if (loginEmpresa != login1 && senhaEmpresa != senha) {
            contador -= 1
            mensagem.style.display = "block";
            mensagem.innerHTML = "Email e senha inválidos"
        } else if (senhaEmpresa != senha) {
            contador -= 1
            mensagem.style.display = "block";
            mensagem.innerHTML = "Senha inválida"
        } else if (loginEmpresa != login1) {
            contador -= 1
            mensagem.style.display = "block";
            mensagem.innerHTML = "Email inválido"
        }
        else {
            mensagem.style.display = "none";
            alert("Login realizado");            
            login_mensagem.style.display = "block";
            login_mensagem.innerHTML = `<img src="./assets/imgs/fe_da_silva-loading-7528.gif" alt="" width="10%" margin-left="5px">`
            setTimeout((login) => {
                window.location.replace("dashboard.html");
            }, 3000);

            exit();

        }









    }


</script>
