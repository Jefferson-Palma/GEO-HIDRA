<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuladorFinanceiro</title>
</head>
<body>
    <div style="text-align: center;"> <!-- "text-align" é uma propriedade de estilo que define o alinhamento do conteúdo; "center" faz os elementos dentro da div ficarem centralizados horizontalmente-->
        <h1>Simulador Financeiro</h1> <br>
        Informe o custo da fundação da obra: <br> <input type="text" id="input_valorFundacao"> <br> <br>
        Informe o tamanho da área que sera feita a obra (em m²):<br> <input type="text" id="input_areaObra"> <br><br>
        

        <button onclick="calcular()">Calcular</button> <br> <br>
    </div>
    <div id="div_msg" style="text-align: center;"></div>
</body>
</html>
<script>
    function calcular(){
        let valorObra=Number(input_valorFundacao.value);
        let area=Number(input_areaObra.value);
        let valorInicio=valorObra*1.3
        let valorFim=valorObra*1.4
        //let atraso=area*???
        div_msg.innerHTML=`Custo esperado para a obra: <span>R$${valorObra.toFixed(2)}</span><br>
        Possível custo sem verificação de umidade do solo na etapa da fundação: R$${valorInicio.toFixed(2)}<br>
        Possível custo sem verificação de umidade do solo em etapas mais avançadas do projeto: R$${valorFim.toFixed(2)}`;
//dias de atrasos:${atraso}
}
</script>
