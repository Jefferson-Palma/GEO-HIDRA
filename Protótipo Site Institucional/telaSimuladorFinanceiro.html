<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Simulador</title>
    <link rel="stylesheet" href="./styleSimulador.css">
</head>
<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="./Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos"><span>Home</span> <span>Sobre Nós</span> <span>Contato</span> <span>Login</span></div>
        </div>
    </header>

    <div class="containerSimulador">
        <div class="divFormulariosSimulador" id="div_formularios_simulador">
            <input type="text" id="ipt_custo_total" class="inputSimulador" placeholder="Informe o custo total da obra:">
            <input type="text" id="ipt_tempo_conclusao" class="inputSimulador" placeholder="Informe o tempo para ser concluída a obra (em meses):">

            <div id="div_mensagem_simulador" class="divMensagemSimulador"></div>

            <button onclick="simular()">Simular</button>
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="./Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span>Home</span> <span>Sobre nós</span> <span>Contato</span> <span>Cadastre-se</span>
            </div>
        </div>
    </footer>
</body>
</html>
