<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="./Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos"><span>Home</span> <span>Sobre Nós</span> <span class="simule">Simule aqui</span>
                <span><img src="./Design sem nome.png" alt="" width="50px"></span></div>
        </div>
    </header>

    <div class="container-login">
        <div class="caixa-login">
            <h1>Login</h1>
            <div class="campo">
                <select id="escolha" required>
                    <option value="#" selected disabled>Selecione uma opção</option>
                    <option value="empresa">Empresa</option>
                    <option value="funcionario">Funcionário</option>
                </select>
                <p>Email</p>
                <input type="text" id="input_emailLogin">
                <p>Senha</p>
                <input type="text" id="input_senhaLogin">
            </div>
             <div id="mensagem"></div>
            <div class="botao">
                <button onclick="login()">Login</button>
            </div>
            <div class="crieconta">
                <span>Não tem uma conta?</span>
                <p>Cadastre-se agora!</p>
            </div>
        </div>
        <div class="imagem">
            <img src="./pexels-keat007-32858871 1.png" alt="">
        </div>

    </div>
    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="./Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo"> 
                <span>Home</span> <span>Sobre nós</span> <span>Contato</span> <span>Cadastre-se</span>
            </div>
        </div>
    </footer>
   
</body>

</html>
<script>
    
    let login1 = 'brandao@sptech.school';
    let senha = 'brandao123@';
    let contador = 3

    function login(){
        
        let selecionar = escolha.value;
        let loginEmpresa = input_emailLogin.value;
        let senhaEmpresa = input_senhaLogin.value;
        
        if(contador == 0){
            alert("Acesso bloqueado, fale com nossa equipe para resolver esse problema.")
        }
        if(selecionar == "empresa"){
         if(loginEmpresa != login1 && senhaEmpresa != senha){
            contador -=1
            mensagem.innerHTML = "Email e senha inválidos"
         } else if (senhaEmpresa != senha){
            contador -=1
            mensagem.innerHTML = "Senha inválida"
         }else if (loginEmpresa != login1){
            contador -=1
            mensagem.innerHTML = "Email inválido"
         }
         else{
             mensagem.innerHTML = "Login realizado"
         }
          
        } 
        
        
        
        





    }


</script>
