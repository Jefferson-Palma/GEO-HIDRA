<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <div class="componentes">
            <div class="logo"><img src="./Group 10.png" alt="Logo da Empresa"></div>
            <div class="caminhos"><span>Home</span> <span>Sobre Nós</span> <span class="simule">Simule aqui</span>
                <span><img src="./Design sem nome.png" alt="" width="50px"></span>
            </div>
        </div>
    </header>

    <div class="container-cadastroFuncionario">
        <div class="caixa-cadastroFuncionario">
            <h1>Cadastrar Empresa</h1>
            <div class="campo-cadastroFuncionario">
                <p>Nome</p>
                <input type="text" id="input_nomeFuncionario">
                <p>CPF</p>
                <input type="text" id="input_cpf">
                <p>Tipo de acesso</p>
                <input type="text" id="input_acesso">
                <p>Email</p>
                <input type="text" id="input_emailEmpresa">
                <p>Senha</p>
                <input type="text" id="input_senhaEmpresa">
                <p>Confirmar senha</p>
                <input type="text" id="input_confirmarSenha">
                <div class="botaoCadastroFuncionario">
                    <button onclick="cadastro()">Registrar</button>
                </div>
            </div>

        </div>
        <div class="imagem">
            <img src="./pexels-keat007-32858871 1.png" alt="">
        </div>
    </div>

    <footer>
        <div class="footerConteudo">
            <div class="logoFooter"><img src="./Group 10.png" alt="Logo da Empresa">
            </div>
            <div class="conteudo">
                <span>Home</span> <span>Sobre nós</span> <span>Contato</span> <span>Cadastre-se</span>
            </div>
        </div>
    </footer>
</body>

</html>
